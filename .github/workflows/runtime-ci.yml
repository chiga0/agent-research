name: Runtime CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check style
        run: python3 scripts/check_style.py

      - name: Compile runtime
        run: python3 -m compileall -q runtime scripts

      - name: Install coverage tool
        run: python3 -m pip install "coverage>=7,<8"

      - name: Runtime tests with coverage gate
        run: python3 scripts/check_runtime_coverage.py

      - name: Build docs
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          mkdocs build --strict
