name: Deploy Runtime

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      executor_strategy:
        description: "qwen executor strategy for this deployment"
        required: false
        default: "shared"
        type: choice
        options:
          - shared
          - per_run_process
          - container
      qwen_container_image:
        description: >-
          Docker image for container executor; required when strategy=container
          unless command var is configured
        required: false
        default: ""
        type: string
      qwen_container_build:
        description: "Build the local qwen executor image on the VPS"
        required: false
        default: false
        type: boolean
      qwen_container_base_image:
        description: "Base image for local qwen executor build"
        required: false
        default: "node:22-bookworm-slim"
        type: string
      qwen_container_cpus:
        description: "Container CPU limit"
        required: false
        default: "1"
        type: string
      qwen_container_memory_mb:
        description: "Container memory limit in MB"
        required: false
        default: "1024"
        type: string
      qwen_container_pids:
        description: "Container pids limit"
        required: false
        default: "256"
        type: string
      validate_qwen:
        description: "Run real qwen single-run acceptance on the VPS"
        required: false
        default: false
        type: boolean
      qwen_validate_mission:
        description: "Also run qwen-backed mission acceptance"
        required: false
        default: false
        type: boolean
      qwen_mission_task_count:
        description: "Number of lightweight qwen mission tasks when mission acceptance is enabled"
        required: false
        default: "1"
        type: string
      expect_executor_strategy:
        description: "Expected executor strategy for qwen acceptance; defaults to executor_strategy"
        required: false
        default: ""
        type: string
      qwen_validation_timeout:
        description: "qwen acceptance timeout in seconds"
        required: false
        default: "600"
        type: string

permissions:
  contents: read

concurrency:
  group: runtime-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.RUNTIME_DEPLOY_ENABLED == '1'
    runs-on: ubuntu-latest
    environment: runtime-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate required secrets
        env:
          RUNTIME_SSH_TARGET: ${{ secrets.RUNTIME_SSH_TARGET }}
          RUNTIME_SSH_KEY: ${{ secrets.RUNTIME_SSH_KEY }}
          RUNTIME_BASIC_AUTH_PASSWORD: ${{ secrets.RUNTIME_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$RUNTIME_SSH_TARGET" || { echo "missing RUNTIME_SSH_TARGET"; exit 1; }
          test -n "$RUNTIME_SSH_KEY" || { echo "missing RUNTIME_SSH_KEY"; exit 1; }
          test -n "$RUNTIME_BASIC_AUTH_PASSWORD" || {
            echo "missing RUNTIME_BASIC_AUTH_PASSWORD";
            exit 1;
          }

      - name: Check style
        run: python3 scripts/check_style.py

      - name: Compile runtime
        run: python3 -m compileall -q runtime scripts

      - name: Install coverage tool
        run: python3 -m pip install "coverage>=7,<8"

      - name: Runtime tests with coverage gate
        run: python3 scripts/check_runtime_coverage.py

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Web lint
        working-directory: web
        run: npm run lint

      - name: Web tests with coverage gate
        working-directory: web
        run: npm run test

      - name: Build web console
        working-directory: web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Web E2E
        working-directory: web
        run: npm run test:e2e

      - name: Write deploy credentials
        env:
          RUNTIME_SSH_KEY: ${{ secrets.RUNTIME_SSH_KEY }}
          QWEN_SETTINGS_JSON: ${{ secrets.QWEN_SETTINGS_JSON }}
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/runtime-deploy"
          printf '%s\n' "$RUNTIME_SSH_KEY" > "$RUNNER_TEMP/runtime-deploy/ssh_key"
          chmod 600 "$RUNNER_TEMP/runtime-deploy/ssh_key"
          if [[ -n "$QWEN_SETTINGS_JSON" ]]; then
            printf '%s\n' "$QWEN_SETTINGS_JSON" > "$RUNNER_TEMP/runtime-deploy/qwen-settings.json"
            chmod 600 "$RUNNER_TEMP/runtime-deploy/qwen-settings.json"
          fi

      - name: Deploy runtime to VPS
        timeout-minutes: 25
        env:
          RUNTIME_SSH_TARGET: ${{ secrets.RUNTIME_SSH_TARGET }}
          PUBLIC_HOST: ${{ secrets.RUNTIME_PUBLIC_HOST }}
          PUBLIC_DOMAIN: ${{ secrets.RUNTIME_PUBLIC_DOMAIN }}
          BASIC_AUTH_USER: ${{ secrets.RUNTIME_BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ secrets.RUNTIME_BASIC_AUTH_PASSWORD }}
          APP_DIR: ${{ vars.RUNTIME_APP_DIR }}
          STATE_DIR: ${{ vars.RUNTIME_STATE_DIR }}
          NODE_PACKAGE: ${{ vars.RUNTIME_QWEN_NODE_PACKAGE }}
          RUN_MANAGER_DEFAULT_CPUS: ${{ vars.RUN_MANAGER_DEFAULT_CPUS }}
          RUN_MANAGER_MAX_CPUS: ${{ vars.RUN_MANAGER_MAX_CPUS }}
          RUN_MANAGER_DEFAULT_MEMORY_MB: ${{ vars.RUN_MANAGER_DEFAULT_MEMORY_MB }}
          RUN_MANAGER_MAX_MEMORY_MB: ${{ vars.RUN_MANAGER_MAX_MEMORY_MB }}
          RUN_MANAGER_DEFAULT_PIDS: ${{ vars.RUN_MANAGER_DEFAULT_PIDS }}
          RUN_MANAGER_MAX_PIDS: ${{ vars.RUN_MANAGER_MAX_PIDS }}
          RUN_MANAGER_DEFAULT_TIMEOUT_SECONDS: ${{ vars.RUN_MANAGER_DEFAULT_TIMEOUT_SECONDS }}
          RUN_MANAGER_MAX_TIMEOUT_SECONDS: ${{ vars.RUN_MANAGER_MAX_TIMEOUT_SECONDS }}
          RUN_MANAGER_CLEANUP_ENABLED: ${{ vars.RUN_MANAGER_CLEANUP_ENABLED }}
          WORKSPACE_RETENTION_SECONDS: ${{ vars.RUN_MANAGER_WORKSPACE_RETENTION_SECONDS }}
          ARTIFACT_RETENTION_SECONDS: ${{ vars.RUN_MANAGER_ARTIFACT_RETENTION_SECONDS }}
          CLEANUP_INTERVAL_SECONDS: ${{ vars.RUN_MANAGER_CLEANUP_INTERVAL_SECONDS }}
          RUNTIME_CPU_QUOTA: ${{ vars.RUNTIME_CPU_QUOTA }}
          RUNTIME_MEMORY_MAX: ${{ vars.RUNTIME_MEMORY_MAX }}
          RUNTIME_TASKS_MAX: ${{ vars.RUNTIME_TASKS_MAX }}
          RUN_MANAGER_STALE_WORKER_SECONDS: ${{ vars.RUN_MANAGER_STALE_WORKER_SECONDS }}
          RUN_MANAGER_BACKUP_RETENTION_COUNT: ${{ vars.RUN_MANAGER_BACKUP_RETENTION_COUNT }}
          DISPATCH_QWEN_EXECUTOR_STRATEGY: ${{ inputs.executor_strategy }}
          VAR_QWEN_EXECUTOR_STRATEGY: ${{ vars.QWEN_EXECUTOR_STRATEGY }}
          QWEN_EXECUTOR_HOST: ${{ vars.QWEN_EXECUTOR_HOST }}
          QWEN_EXECUTOR_PORT_START: ${{ vars.QWEN_EXECUTOR_PORT_START }}
          QWEN_EXECUTOR_PORT_END: ${{ vars.QWEN_EXECUTOR_PORT_END }}
          QWEN_EXECUTOR_COMMAND: ${{ vars.QWEN_EXECUTOR_COMMAND }}
          QWEN_EXECUTOR_STARTUP_TIMEOUT: ${{ vars.QWEN_EXECUTOR_STARTUP_TIMEOUT }}
          QWEN_EXECUTOR_STOP_TIMEOUT: ${{ vars.QWEN_EXECUTOR_STOP_TIMEOUT }}
          QWEN_CONTAINER_COMMAND: ${{ vars.QWEN_CONTAINER_COMMAND }}
          DISPATCH_QWEN_CONTAINER_IMAGE: ${{ inputs.qwen_container_image }}
          VAR_QWEN_CONTAINER_IMAGE: ${{ vars.QWEN_CONTAINER_IMAGE }}
          DISPATCH_QWEN_CONTAINER_BUILD: ${{ inputs.qwen_container_build }}
          VAR_QWEN_CONTAINER_BUILD: ${{ vars.QWEN_CONTAINER_BUILD }}
          DISPATCH_QWEN_CONTAINER_BASE_IMAGE: ${{ inputs.qwen_container_base_image }}
          VAR_QWEN_CONTAINER_BASE_IMAGE: ${{ vars.QWEN_CONTAINER_BASE_IMAGE }}
          QWEN_CONTAINER_NODE_PACKAGE: ${{ vars.QWEN_CONTAINER_NODE_PACKAGE }}
          QWEN_CONTAINER_NETWORK: ${{ vars.QWEN_CONTAINER_NETWORK }}
          DISPATCH_QWEN_CONTAINER_CPUS: ${{ inputs.qwen_container_cpus }}
          VAR_QWEN_CONTAINER_CPUS: ${{ vars.QWEN_CONTAINER_CPUS }}
          DISPATCH_QWEN_CONTAINER_MEMORY_MB: ${{ inputs.qwen_container_memory_mb }}
          VAR_QWEN_CONTAINER_MEMORY_MB: ${{ vars.QWEN_CONTAINER_MEMORY_MB }}
          DISPATCH_QWEN_CONTAINER_PIDS: ${{ inputs.qwen_container_pids }}
          VAR_QWEN_CONTAINER_PIDS: ${{ vars.QWEN_CONTAINER_PIDS }}
          QWEN_CONTAINER_EXTRA_ARGS: ${{ vars.QWEN_CONTAINER_EXTRA_ARGS }}
        run: |
          set -euo pipefail
          export PUBLIC_HOST="${PUBLIC_HOST:-_}"
          export BASIC_AUTH_USER="${BASIC_AUTH_USER:-cloudagents}"
          export APP_DIR="${APP_DIR:-/opt/agent-research}"
          export STATE_DIR="${STATE_DIR:-/var/lib/cloud-agents-runtime}"
          export RUN_MANAGER_WORKSPACE_RETENTION_SECONDS="$WORKSPACE_RETENTION_SECONDS"
          export RUN_MANAGER_ARTIFACT_RETENTION_SECONDS="$ARTIFACT_RETENTION_SECONDS"
          export RUN_MANAGER_CLEANUP_INTERVAL_SECONDS="$CLEANUP_INTERVAL_SECONDS"
          export DEPLOY_RUNTIME_PRINT_SECRETS=0
          export QWEN_EXECUTOR_STRATEGY="${VAR_QWEN_EXECUTOR_STRATEGY:-}"
          export QWEN_CONTAINER_IMAGE="${VAR_QWEN_CONTAINER_IMAGE:-}"
          export QWEN_CONTAINER_CPUS="${VAR_QWEN_CONTAINER_CPUS:-}"
          export QWEN_CONTAINER_MEMORY_MB="${VAR_QWEN_CONTAINER_MEMORY_MB:-}"
          export QWEN_CONTAINER_PIDS="${VAR_QWEN_CONTAINER_PIDS:-}"
          export QWEN_CONTAINER_BUILD="${VAR_QWEN_CONTAINER_BUILD:-}"
          export QWEN_CONTAINER_BASE_IMAGE="${VAR_QWEN_CONTAINER_BASE_IMAGE:-}"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            export QWEN_EXECUTOR_STRATEGY="${DISPATCH_QWEN_EXECUTOR_STRATEGY:-shared}"
            if [[ -n "${DISPATCH_QWEN_CONTAINER_IMAGE:-}" ]]; then
              export QWEN_CONTAINER_IMAGE="$DISPATCH_QWEN_CONTAINER_IMAGE"
            fi
            export QWEN_CONTAINER_BUILD="$DISPATCH_QWEN_CONTAINER_BUILD"
            export QWEN_CONTAINER_BASE_IMAGE="$DISPATCH_QWEN_CONTAINER_BASE_IMAGE"
            if [[ -n "${DISPATCH_QWEN_CONTAINER_CPUS:-}" ]]; then
              export QWEN_CONTAINER_CPUS="$DISPATCH_QWEN_CONTAINER_CPUS"
            fi
            if [[ -n "${DISPATCH_QWEN_CONTAINER_MEMORY_MB:-}" ]]; then
              export QWEN_CONTAINER_MEMORY_MB="$DISPATCH_QWEN_CONTAINER_MEMORY_MB"
            fi
            if [[ -n "${DISPATCH_QWEN_CONTAINER_PIDS:-}" ]]; then
              export QWEN_CONTAINER_PIDS="$DISPATCH_QWEN_CONTAINER_PIDS"
            fi
          fi
          if [[ -f "$RUNNER_TEMP/runtime-deploy/qwen-settings.json" ]]; then
            export QWEN_SETTINGS_FILE="$RUNNER_TEMP/runtime-deploy/qwen-settings.json"
          fi
          bash scripts/deploy_runtime_vps.sh \
            "$RUNTIME_SSH_TARGET" \
            "$RUNNER_TEMP/runtime-deploy/ssh_key"

      - name: Smoke test deployed runtime
        env:
          RUNTIME_SSH_TARGET: ${{ secrets.RUNTIME_SSH_TARGET }}
          APP_DIR: ${{ vars.RUNTIME_APP_DIR }}
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/agent-research}"
          ssh -i "$RUNNER_TEMP/runtime-deploy/ssh_key" \
            -o StrictHostKeyChecking=accept-new \
            "$RUNTIME_SSH_TARGET" \
            "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          RUN_MANAGER_TOKEN="$(
            awk -F= '$1 == "RUN_MANAGER_TOKEN" {print $2}' /etc/cloud-agents-runtime.env
          )"
          cd "$APP_DIR"
          python3 scripts/validate_runtime.py \
            --base-url http://127.0.0.1:8765 \
            --token "$RUN_MANAGER_TOKEN" \
            --adapter fake \
            --timeout 30
          REMOTE

      - name: Qwen deep acceptance on VPS
        if: github.event_name == 'workflow_dispatch' && inputs.validate_qwen
        env:
          RUNTIME_SSH_TARGET: ${{ secrets.RUNTIME_SSH_TARGET }}
          APP_DIR: ${{ vars.RUNTIME_APP_DIR }}
          QWEN_ACCEPTANCE_TIMEOUT: ${{ inputs.qwen_validation_timeout }}
          QWEN_EXPECT_EXECUTOR_STRATEGY: ${{ inputs.expect_executor_strategy }}
          QWEN_DEPLOY_EXECUTOR_STRATEGY: ${{ inputs.executor_strategy }}
          QWEN_VALIDATE_MISSION: ${{ inputs.qwen_validate_mission }}
          QWEN_MISSION_TASK_COUNT: ${{ inputs.qwen_mission_task_count }}
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/agent-research}"
          REMOTE_ENV=(
            "APP_DIR='$APP_DIR'"
            "QWEN_ACCEPTANCE_TIMEOUT='$QWEN_ACCEPTANCE_TIMEOUT'"
            "QWEN_EXPECT_EXECUTOR_STRATEGY='$QWEN_EXPECT_EXECUTOR_STRATEGY'"
            "QWEN_DEPLOY_EXECUTOR_STRATEGY='$QWEN_DEPLOY_EXECUTOR_STRATEGY'"
            "QWEN_VALIDATE_MISSION='$QWEN_VALIDATE_MISSION'"
            "QWEN_MISSION_TASK_COUNT='$QWEN_MISSION_TASK_COUNT'"
          )
          ssh -i "$RUNNER_TEMP/runtime-deploy/ssh_key" \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$RUNTIME_SSH_TARGET" \
            "${REMOTE_ENV[*]} bash -s" <<'REMOTE'
          set -euo pipefail
          RUN_MANAGER_TOKEN="$(
            awk -F= '$1 == "RUN_MANAGER_TOKEN" {print $2}' /etc/cloud-agents-runtime.env
          )"
          EXPECT="$QWEN_EXPECT_EXECUTOR_STRATEGY"
          if [[ -z "$EXPECT" ]]; then
            EXPECT="$QWEN_DEPLOY_EXECUTOR_STRATEGY"
          fi
          cd "$APP_DIR"
          if ! [[ "$QWEN_ACCEPTANCE_TIMEOUT" =~ ^[0-9]+$ ]]; then
            echo "invalid qwen acceptance timeout: $QWEN_ACCEPTANCE_TIMEOUT"
            exit 1
          fi
          if ! [[ "$QWEN_MISSION_TASK_COUNT" =~ ^[0-9]+$ ]]; then
            echo "invalid qwen mission task count: $QWEN_MISSION_TASK_COUNT"
            exit 1
          fi
          hard_timeout="$((QWEN_ACCEPTANCE_TIMEOUT + 120))"
          args=(
            --base-url http://127.0.0.1:8765
            --token "$RUN_MANAGER_TOKEN"
            --timeout "$QWEN_ACCEPTANCE_TIMEOUT"
            --validate-single-run
          )
          if [[ -n "$EXPECT" ]]; then
            args+=(--expect-executor-strategy "$EXPECT")
          fi
          case "${QWEN_VALIDATE_MISSION,,}" in
            true|1|yes)
              args+=(--validate-mission --mission-task-count "$QWEN_MISSION_TASK_COUNT")
              ;;
          esac
          echo "starting qwen deep acceptance with timeout=${QWEN_ACCEPTANCE_TIMEOUT}s"
          timeout --kill-after=30s "${hard_timeout}s" \
            python3 scripts/validate_qwen_mission.py "${args[@]}" &
          acceptance_pid="$!"
          (
            while kill -0 "$acceptance_pid" 2>/dev/null; do
              sleep 30
              if kill -0 "$acceptance_pid" 2>/dev/null; then
                date -u +"qwen deep acceptance still running at %Y-%m-%dT%H:%M:%SZ"
              fi
            done
          ) &
          heartbeat_pid="$!"
          cleanup() {
            kill "$heartbeat_pid" 2>/dev/null || true
            kill "$acceptance_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          set +e
          wait "$acceptance_pid"
          acceptance_status="$?"
          set -e
          kill "$heartbeat_pid" 2>/dev/null || true
          wait "$heartbeat_pid" 2>/dev/null || true
          if [[ "$acceptance_status" -ne 0 ]]; then
            echo "qwen deep acceptance failed with status $acceptance_status"
            auth_header="Authorization: Bearer $RUN_MANAGER_TOKEN"
            echo "queue snapshot:"
            curl -fsS --max-time 10 -H "$auth_header" \
              http://127.0.0.1:8765/queue || true
            echo
            echo "executor snapshot:"
            curl -fsS --max-time 10 -H "$auth_header" \
              http://127.0.0.1:8765/executors || true
            echo
          fi
          exit "$acceptance_status"
          REMOTE

      - name: Verify deployed revision
        env:
          RUNTIME_SSH_TARGET: ${{ secrets.RUNTIME_SSH_TARGET }}
          APP_DIR: ${{ vars.RUNTIME_APP_DIR }}
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/agent-research}"
          ssh -i "$RUNNER_TEMP/runtime-deploy/ssh_key" \
            -o StrictHostKeyChecking=accept-new \
            "$RUNTIME_SSH_TARGET" \
            "APP_DIR='$APP_DIR' EXPECTED_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          DEPLOYED_SHA="$(git -C "$APP_DIR" rev-parse HEAD)"
          test "$DEPLOYED_SHA" = "$EXPECTED_SHA" || {
            echo "server has $DEPLOYED_SHA, expected $EXPECTED_SHA";
            exit 1;
          }
          echo "server revision: $DEPLOYED_SHA"
          REMOTE

      - name: Smoke test public runtime ingress
        env:
          PUBLIC_HOST: ${{ secrets.RUNTIME_PUBLIC_HOST }}
          BASIC_AUTH_USER: ${{ secrets.RUNTIME_BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ secrets.RUNTIME_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          PUBLIC_HOST="${PUBLIC_HOST:-}"
          BASIC_AUTH_USER="${BASIC_AUTH_USER:-cloudagents}"
          test -n "$PUBLIC_HOST" || { echo "missing RUNTIME_PUBLIC_HOST"; exit 1; }
          cookie_jar="$RUNNER_TEMP/runtime-deploy/public-cookies.txt"
          curl -fsS \
            --retry 5 \
            --retry-delay 2 \
            -c "$cookie_jar" \
            -H "content-type: application/json" \
            -d "{\"username\":\"$BASIC_AUTH_USER\",\"password\":\"$BASIC_AUTH_PASSWORD\"}" \
            "http://$PUBLIC_HOST/cloud-agents/auth/login"
          curl -fsS \
            --retry 5 \
            --retry-delay 2 \
            -b "$cookie_jar" \
            "http://$PUBLIC_HOST/cloud-agents/health"
